global:
  scrape_interval: 10s
rule_files: ["/etc/prometheus/alerts.yml"]
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
scrape_configs:
  - job_name: "dh-app"   #FastAPI进程的Prometheus Exporter
    static_configs:
      - targets: ["host.docker.internal:9464"]
  - job_name: "pushgateway"   #离线评测指标
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]